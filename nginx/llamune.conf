server {
    listen 80;
    server_name _;

    # フロントエンド（静的ファイル）
    location / {
        root /Users/mini/dev/llamune/web/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # バックエンドAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
